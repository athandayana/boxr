<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boxr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar: Actions & Backlog -->
        <aside class="sidebar glass-panel">
            <header class="brand">
                <i class="ph ph-sparkle-fill brand-icon"></i>
                <h1>boxr</h1>
            </header>

            <section class="add-task-section">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
                    <h2 style="margin-bottom: 0;">New box</h2>
                    <button id="manage-routines-btn" class="btn-ghost"
                        style="font-size: 0.75rem; padding: 0.25rem 0.5rem;"><i class="ph ph-repeat"></i>
                        Routines</button>
                </div>
                <form id="add-task-form" class="task-form">
                    <div class="input-group">
                        <input type="text" id="task-name" placeholder="what do you need to do?" required
                            autocomplete="off" />
                    </div>

                    <div class="duration-selector">
                        <label>Est. Duration</label>
                        <div class="duration-chips">
                            <label class="chip">
                                <input type="radio" name="duration" value="30" checked>
                                <span>30m</span>
                            </label>
                            <label class="chip">
                                <input type="radio" name="duration" value="60">
                                <span>1h</span>
                            </label>
                            <label class="chip">
                                <input type="radio" name="duration" value="90">
                                <span>1.5h</span>
                            </label>
                            <label class="chip">
                                <input type="radio" name="duration" value="120">
                                <span>2h</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="ph ph-plus"></i> Add to Backlog
                    </button>
                </form>
            </section>

            <section class="backlog-section">
                <div class="section-header">
                    <h2>Unscheduled Backlog</h2>
                    <span id="backlog-count" class="badge">0</span>
                </div>

                <div id="backlog-list" class="task-list">
                    <!-- Tasks will be appended here -->
                    <div class="empty-state">No boxes pending</div>
                </div>

                <div class="auto-schedule-wrapper">
                    <button id="ai-schedule-btn" class="btn-magic">
                        <span class="magic-glow"></span>
                        <span class="btn-content">
                            <i class="ph ph-magic-wand"></i>
                            schedule
                        </span>
                    </button>
                </div>
            </section>
        </aside>

        <!-- Main Content: Schedule View -->
        <main class="schedule-view glass-panel">
            <header class="schedule-header">
                <div class="schedule-header-top">
                    <div class="date-display">
                        <h2 id="current-date">Today</h2>
                        <p id="current-day">Loading...</p>
                    </div>
                    <div class="schedule-actions">
                        <button id="clear-schedule-btn" class="btn-ghost">
                            <i class="ph ph-trash"></i> Clear Schedule
                        </button>
                    </div>
                </div>
                <div id="day-navigator" class="day-navigator">
                    <!-- Days will be generated by JS -->
                </div>
            </header>

            <div class="timeline-container scrollable-y">
                <div id="timeline" class="timeline">
                    <!-- Time slots from 8 AM to 8 PM will be generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modals / Overlays (Optional) -->
    <div id="ai-processing-overlay" class="overlay hidden">
        <div class="magic-loader">
            <div class="spinner"></div>
            <h3>boxing your day...</h3>
        </div>
    </div>

    <!-- Routines Modal -->
    <div id="routines-modal" class="overlay hidden">
        <div class="modal-content glass-panel">
            <header class="modal-header">
                <h2 style="margin: 0;">manage routine boxes</h2>
                <button id="close-routines-btn" class="btn-ghost" style="padding: 0.5rem;"><i
                        class="ph ph-x"></i></button>
            </header>
            <div class="modal-body">
                <div class="routine-form-section">
                    <form id="add-routine-form" class="task-form" style="gap: 1rem;">
                        <div class="input-group">
                            <input type="text" id="routine-name" placeholder="E.g. School, Gym" required
                                autocomplete="off" />
                        </div>
                        <div class="days-selector-wrapper">
                            <label
                                style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem; display: block;">Repeats
                                On</label>
                            <div class="days-selector">
                                <label class="day-check"><input type="checkbox" value="1"><span>M</span></label>
                                <label class="day-check"><input type="checkbox" value="2"><span>T</span></label>
                                <label class="day-check"><input type="checkbox" value="3"><span>W</span></label>
                                <label class="day-check"><input type="checkbox" value="4"><span>T</span></label>
                                <label class="day-check"><input type="checkbox" value="5"><span>F</span></label>
                                <label class="day-check"><input type="checkbox" value="6"><span>S</span></label>
                                <label class="day-check"><input type="checkbox" value="0"><span>S</span></label>
                            </div>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <div class="input-group" style="flex: 1;">
                                <select id="routine-start" required class="custom-select">
                                    <!-- JS populated -->
                                </select>
                            </div>
                            <div class="input-group" style="flex: 1;">
                                <select id="routine-duration" required class="custom-select">
                                    <option value="30">30m</option>
                                    <option value="60">1h</option>
                                    <option value="90">1.5h</option>
                                    <option value="120">2h</option>
                                    <option value="180">3h</option>
                                    <option value="240">4h</option>
                                    <option value="300">5h</option>
                                    <option value="360">6h</option>
                                    <option value="420">7h</option>
                                    <option value="480">8h</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" style="padding: 0.5rem;"><i class="ph ph-plus"></i>
                            Add routine box</button>
                    </form>
                </div>
                <div class="routines-list-section" style="margin-top: 2rem;">
                    <h3
                        style="font-size: 0.85rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 1rem;">
                        routine boxes</h3>
                    <div id="routines-list" class="task-list" style="max-height: 200px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
